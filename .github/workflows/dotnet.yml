name: dotnet package

on:
  push:
    # Sequence of patterns matched against refs/tags
    tags:
      - v*
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: windows-latest
    outputs:
      artifact-id: ${{ steps.upload.outputs.artifact-id }}
    steps:
      - uses: actions/checkout@v4

      # Pre-installed in windows-latest
      # - name: Setup .NET Core SDK 8.0
      #   uses: actions/setup-dotnet@v4
      #   with:
      #     dotnet-version: '8.0.x'

      - name: Add msbuild to PATH
        uses: microsoft/setup-msbuild@v1

      - name: Install dependencies
        run: dotnet restore --nologo

      - name: Build
        run: msbuild YoutubeSegmentDownloader.sln -t:publish -p:Configuration=Release -p:DeployOnBuild=true -p:PublishProfile=ClickOnceProfile

      - name: Upload Artifact
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: artifact
          path: bin/Release/net8.0-windows/win-x64/app.publish
          retention-days: 1

  sign:
    # Sign releases and master branch builds with SignPath.io (free for open source).
    # To enable signing, create a free account at https://about.signpath.io/product/open-source
    # and configure the following repository secrets:
    #   SIGNPATH_API_TOKEN         – API access token from SignPath.io
    #   SIGNPATH_ORGANIZATION_ID   – Your organization ID in SignPath.io
    # Then set up a project named "YoutubeSegmentDownloader" with a signing policy
    # slug "release-signing" and an artifact configuration that signs *.exe files.
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'push' && github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
    steps:
      - name: Sign artifacts with SignPath.io
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
          project-slug: YoutubeSegmentDownloader
          signing-policy-slug: release-signing
          github-artifact-id: ${{ needs.build.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed-artifact

      - name: Upload signed artifact
        uses: actions/upload-artifact@v4
        with:
          name: signed-artifact
          path: signed-artifact/
          retention-days: 1

  deploy_setup:
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'push' && github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    needs: sign
    steps:
      - name: Download signed artifacts
        uses: actions/download-artifact@v4
        with:
          name: signed-artifact

      - name: Deploy files to setup branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          keep_files: true
          publish_branch: setup

  release:
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'push' && github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    needs: sign
    steps:
      - name: Download signed artifacts
        uses: actions/download-artifact@v4
        with:
          name: signed-artifact

      - name: Generate tag name
        id: tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "tag=build-$(date +'%Y%m%d-%H%M%S')-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          fi

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          body_path: NOTICE
          files: |
            YoutubeSegmentDownloader.exe
            setup.exe
